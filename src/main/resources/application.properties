spring.application.name=ManagementPlatform

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/management_platform?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=284100
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.continue-on-error=true

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis-plus.global-config.db-config.id-type=auto

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=3s
spring.data.redis.repositories.enabled=false

security.jwt.secret=replace-with-secure-secret-in-prod
security.jwt.access-token-expire-seconds=7200
security.jwt.refresh-token-expire-seconds=1209600
security.login-crypto.aes-key=ZFLoginCryptoKey2026ForDemo12345

app.ai.enabled=false
app.ai.base-url=http://localhost:11434/v1
app.ai.api-key=replace-me
app.ai.model=gpt-4o-mini
app.ai.timeout=20s
